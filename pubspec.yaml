name: business_management
description: A Flutter business management app with Bengali UI for sales, inventory, and billing.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ডাটাবেস এবং স্টেট ম্যানেজমেন্ট
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # চার্ট, পিডিএফ এবং কানেক্টিভিটি
  fl_chart: ^0.66.0
  pdf: ^3.10.7
  printing: ^5.11.1
  connectivity_plus: ^5.0.2

  # ফায়ারবেস (ক্লাউড সিঙ্কের জন্য)
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
